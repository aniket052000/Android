# When a PR is merged, reads the existing Confluence project summary + the PR
# code diff, then uses AI (Groq/Llama, free) to regenerate the entire project
# summary incorporating the new changes.
#
# Required repo secrets:
#   CONFLUENCE_BASE_URL   - e.g. https://aniketforwork.atlassian.net
#   CONFLUENCE_PAGE_ID    - Project summary page ID
#   CONFLUENCE_EMAIL      - Atlassian account email
#   CONFLUENCE_API_TOKEN  - Atlassian API token
#   GROQ_API_KEY          - Free API key from https://console.groq.com

name: Update Confluence on PR merge

on:
  pull_request:
    types: [closed]
    branches: [main, master]

jobs:
  update-confluence:
    name: Update Confluence project summary
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update Confluence with PR changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_PAGE_ID: ${{ secrets.CONFLUENCE_PAGE_ID }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node .github/scripts/update-confluence-from-pr.js
